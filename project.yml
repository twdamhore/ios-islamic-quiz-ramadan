name: IslamicQuizRamadan
options:
  bundleIdPrefix: com.twdamhore
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  IslamicQuizRamadan:
    type: application
    platform: iOS
    sources:
      - path: IslamicQuizRamadan
        excludes:
          - "**/.DS_Store"
          - "**/.gitkeep"
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.twdamhore.IslamicQuizRamadan
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
