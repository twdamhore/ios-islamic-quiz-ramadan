# project.yml — XcodeGen spec (source of truth for the Xcode project).
# The generated .xcodeproj is committed so contributors can open the project
# without installing XcodeGen. After editing this file, run: xcodegen generate
name: IslamicQuizRamadan
options:
  bundleIdPrefix: com.twdamhore
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

targets:
  IslamicQuizRamadan:
    type: application
    platform: iOS
    sources:
      - path: IslamicQuizRamadan
        excludes:
          - "**/.DS_Store"
          - "**/.gitkeep"
      # Folder references for empty directories so they appear in Xcode's
      # navigator. Remove each entry once the folder contains source files
      # (XcodeGen auto-discovers them from the main sources path above).
      - { path: IslamicQuizRamadan/ViewModels, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Views/Game, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Views/Leaderboard, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Views/Settings, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Views/Error, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Views/Components, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Services, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Theme, buildPhase: none, type: folder, optional: true }
      - { path: IslamicQuizRamadan/Resources/Sounds, buildPhase: none, type: folder, optional: true }
    settings:
      base:
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.twdamhore.IslamicQuizRamadan
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
